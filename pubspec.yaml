name: flutter_amazon_clone_bloc
description: A new Flutter project.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.1.5 <4.0.0"

dependencies:
  bloc: ^9.0.0
  cached_network_image: ^3.3.1
  camera_camera: ^3.0.0
  carousel_slider: ^4.2.1
  cloudinary_public: ^0.23.1
  cupertino_icons: ^1.0.6
  dotted_border: ^2.1.0
  equatable: ^2.0.5
  file_picker: ^8.0.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  flutter_dotenv: ^5.1.0
  flutter_launcher_icons: ^0.13.1
  flutter_rating_bar: ^4.0.1
  go_router: ^14.0.0
  http: ^1.2.0
  hydrated_bloc: ^10.0.0
  intl: ^0.20.2
  path_provider: ^2.1.2
  pay: ^1.1.2
  rename: ^3.0.1
  shared_preferences: ^2.2.2
  syncfusion_flutter_charts: ^33.2.3

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/category_images/
    - assets/images/bottom_offers/
    - assets/images/bottom_nav_bar/
    - assets/images/product_quality_icons/
    - assets/images/cart_screen_icons/
    - assets/applepay.json
    - assets/gpay.json
    - config.env
  fonts:
    - family: AmazonEmber
      fonts:
        - asset: assets/fonts/amazon_ember/AmazonEmber_Th.ttf
          weight: 100
        - asset: assets/fonts/amazon_ember/AmazonEmber_Lt.ttf
          weight: 200
        - asset: assets/fonts/amazon_ember/AmazonEmber_Rg.ttf
          weight: 400
        - asset: assets/fonts/amazon_ember/AmazonEmber_Medium.ttf
          weight: 500
        - asset: assets/fonts/amazon_ember/AmazonEmber_Bd.ttf
          weight: 700
        - asset: assets/fonts/amazon_ember/AmazonEmber_He.ttf
          weight: 900
